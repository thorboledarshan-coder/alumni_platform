<!DOCTYPE html>
<html>
<head>
<title>Add Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Add Alumni Details</h2>

<form action="/add_alumni" method="POST" class="w-50 mx-auto">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control">
</div>

<div class="mb-3">
<label>Batch</label>
<input type="text" name="batch" class="form-control">
</div>

<div class="mb-3">
<label>Company</label>
<input type="text" name="company" class="form-control">
</div>

<div class="mb-3">
<label>Role</label>
<input type="text" name="role" class="form-control">
</div>

<div class="mb-3">
<label>Skills (comma separated)</label>
<input type="text" name="skills" class="form-control" placeholder="e.g. Python, SQL, Machine Learning,java">
</div>




<button class="btn btn-success mt-2 w-100">Save</button>

</form>

</div>

</body>
</html>
