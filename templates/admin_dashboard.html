<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body { margin:0; font-family: Arial;
    background: url('https://s3-alpha.figma.com/hub/file/6354838981/3703827a-07ff-4140-a088-351e231254ad-cover.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
 }

.sidebar {
    width: 230px;
    height: 100vh;
    position: fixed;
    background: #111827;
    color: white;
    padding-top: 20px;
}
.navbar {
    margin-left: 230px;
}

.sidebar a { display:block; padding:12px; color:white; text-decoration:none; }
.sidebar a:hover { background:#1f2937; }

.navbar {
    margin-left:230px;
    padding:15px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.content {
    margin-left:230px;
    padding:20px;
    animation: fadeIn 0.6s ease-in-out;
}

.card { transition:0.3s; }
.card:hover { transform:translateY(-8px); }

@keyframes fadeIn {
    from { opacity:0; }
    to { opacity:1; }
}
</style>

</head>

<body>
    <!-- Top Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="#">🎓 Alumni_connect</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/dashboard">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact">Contact</a>
</li>

<li class="nav-item">
<a class="nav-link text-danger" href="/logout">Logout</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="sidebar">
    <h4 class="text-center">⚙️ Admin Panel</h4>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/view_users">Users</a>
    <a href="/admin_alumni">Alumni Data</a>
    <a href="/admin_reports">Reports</a>
    <a href="/logout">Logout</a>
</div>

<div class="navbar d-flex justify-content-between">
    <h5>Admin Dashboard</h5>
    <span>{{name}}</span>
</div>

<div class="content">

<h3>Admin Controls</h3>

<div class="row mt-4">

    <div class="col-md-4">
    <div class="card p-3 text-center shadow">
    <i class="bi bi-people fs-1 text-primary"></i>
    <h5>Total Users</h5>
    <h3>{{users}}</h3>
    </div>
    </div>
    
    <div class="col-md-4">
    <div class="card p-3 text-center shadow">
    <i class="bi bi-person-badge fs-1 text-success"></i>
    <h5>Total Alumni</h5>
    <h3>{{alumni}}</h3>
    </div>
    </div>
    
    <div class="col-md-4">
    <div class="card p-3 text-center shadow">
    <i class="bi bi-building fs-1 text-danger"></i>
    <h5>Companies</h5>
    <h3>{{companies}}</h3>
    </div>
    </div>
    
    </div>

</div>

</body>
</html>
