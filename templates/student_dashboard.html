<style>
body { margin:0; font-family: Arial; }

.sidebar {
    width: 230px;
    height: 100vh;

}

.navbar {

}

.content {

}

    <ul class="navbar-nav ms-auto">
    
    <li class="nav-item">

    </li>
    
    <li class="nav-item">

<div class="card p-3 text-center">
