<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    margin: 0;
    font-family: Arial;

    background: url('https://cache.careers360.mobi/media/presets/720X480/colleges/social-media/media-gallery/5322/2019/1/11/Campus%20View%20of%20GS%20Mandals%20Maharashtra%20Institute%20of%20Technology%20Aurangabad_Campus-View.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    top: 0;
    left: 0;
}

/* Login box */
.login-box {
    position: relative;
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 20px rgba(0,0,0,0.3);
    z-index: 1;
}

/* Heading */
.login-box h3 {
    text-align: center;
    margin-bottom: 10px;
}

/* Subtitle */
.login-box p {
    text-align: center;
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

/* Button */
.btn-custom {
    background: #2a5298;
    color: white;
}

.btn-custom:hover {
    background: #1e3c72;
}
</style>

</head>

<body>

<div class="login-box">

<h3>🎓 Alumni System</h3>
<p>Login to your account</p>

<form action="/login" method="POST">

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter your password" required>
</div>

<button class="btn btn-custom w-100">Login</button>

</form>

<p class="mt-3">
Don't have an account? <a href="/register">Register</a>
</p>

</div>

</body>
</html>
