<!DOCTYPE html>
<html>
<head>
<title>Edit Event</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h3>Edit Event</h3>

<form method="POST">

<input type="text" name="title" value="{{event.title}}" class="form-control mb-3">
<textarea name="description" class="form-control mb-3">{{event.description}}</textarea>
<input type="date" name="date" value="{{event.date}}" class="form-control mb-3">

<button class="btn btn-success">Update</button>

</form>

</div>

</body>
</html>
