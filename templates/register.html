<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    
    

<div class="container mt-5">

<h2 class="text-center">Register</h2>

<form action="/register" method="POST" class="w-50 mx-auto">

    <div class="mb-3">
    <label>Select user</label>
    <select name="role" class="form-control">
    <option value="alumni">Alumni</option>
    <option value="student">Student</option>
    </select>
    </div>

    <div class="mb-3">
    <label>Name</label>
    <input type="text" name="name" class="form-control">
    </div>
    
    <div class="mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control">
    </div>
    
    <div class="mb-3">
    <label>Password</label>
    <input type="password" name="password" class="form-control">
    </div>

    <div class="mb-3">
    <label>Skills </label>
    <input type="text" name="skills" class="form-control" placeholder="Python,Java,Data Analysis,ML,SQL" >
    </div>

    <div class="mb-3">
        <label>Batch</label>
        <input type="text" name="batch" class="form-control" placeholder="2022-2026">
    </div>

    <div class="mb-3">
        <label>Company</label>
        <input type="text" name="company" class="form-control"placeholder="Google,TCS" >
    </div>
    <div class="mb-3">
        <label>job_role</label>
        <input type="text" name="job_role" class="form-control" placeholder="Software Engineer,Data Analyst" >
    </div>
    
    <button class="btn btn-success mt-2 w-100">Register</button>
    
    </form>

</div>

<style>
    body { margin:0; font-family: Arial;
        background: url('https://static.vecteezy.com/system/resources/previews/013/106/785/large_2x/abstract-white-lines-square-background-modern-concept-with-minimalist-composition-element-texture-for-cover-design-book-design-poster-backdrop-flyer-website-backgrounds-or-advertising-free-vector.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
     }
  </style>
</body>
</html>
