<!DOCTYPE html>
<html>
<head>

<title>Search Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
}

.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: #1e293b;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #334155;
}

.content {
    margin-left: 220px;
    padding: 20px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center">Alumni</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/add_alumni">Add Alumni</a>
    <a href="/view_alumni">View Alumni</a>
    <a href="/search">Search</a>
    <a href="/analytics">Analytics</a>
    <a href="/logout">Logout</a>
</div>

<!-- Content -->
<div class="content">

<h2>Search Alumni</h2>

<div class="card shadow p-4 mt-3">

<form method="POST">

<div class="row">

<div class="col-md-6">
<input type="text" name="name" placeholder="Search by Name" class="form-control mb-3">
</div>

<div class="col-md-6">
<input type="text" name="company" placeholder="Search by Company" class="form-control mb-3">
</div>

<div class="col-md-6">
<input type="text" name="batch" placeholder="Search by Batch" class="form-control mb-3">
</div>


</div>

<button class="btn btn-primary w-100">Search</button>

</form>

</div>

</div>

</body>
</html>
