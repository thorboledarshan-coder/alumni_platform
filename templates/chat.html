<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ece5dd;
}

/* Chat container */
.chat-container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.chat-list {
    width: 30%;
    background: #fff;
    border-right: 1px solid #ccc;
    padding: 10px;
}

/* Chat area */
.chat-box {
    width: 70%;
    display: flex;
    flex-direction: column;
}

/* Messages */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* Message bubbles */
.msg {
    max-width: 60%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

.sent {
    background: #dcf8c6;
    margin-left: auto;
}

.received {
    background: #fff;
}

/* Input */
.chat-input {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

.chat-input input {
    flex: 1;
    padding: 10px;
}

.chat-input button {
    margin-left: 10px;
}
</style>

</head>

<body>

<div class="chat-container">

<!-- LEFT: Chat List -->
<div class="chat-list">
    <h5>Chats</h5>

    {% for c in chats %}
    <a href="/chat/{{c}}" class="d-block p-2 border-bottom">
        {{c}}
    </a>
    {% endfor %}
</div>

<!-- RIGHT: Chat Box -->
<div class="chat-box">

<div class="messages">

{% for m in messages %}

{% if m.sender == session["email"] %}
<div class="msg sent">
    {{m.message}}
</div>
{% else %}
<div class="msg received">
    {{m.message}}
</div>
{% endif %}

{% if m.reply %}
<div class="msg received">
    {{m.reply}}
</div>
{% endif %}

{% endfor %}

</div>

<!-- Input -->
<form method="POST" class="chat-input">
    <input type="text" name="message" placeholder="Type a message">
    <button class="btn btn-success">Send</button>
</form>

</div>

</div>

</body>
</html>
