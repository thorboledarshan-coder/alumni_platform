<!DOCTYPE html>
<html>
<head>
    <title>Skill Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
        }

        .sidebar a:hover { background: #334155; }

        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center">Alumni</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/add_alumni">Add Alumni</a>
    <a href="/view_alumni">View Alumni</a>
    <a href="/search">Search</a>
    <a href="/analytics">Analytics</a>
    <a href="/skill_analysis">Skill Analysis</a>
    <a href="/logout">Logout</a>
</div>

<!-- Content -->
<div class="content">

<h2>Skill Demand Analysis</h2>

<div class="card shadow p-4 mt-4">
    <canvas id="skillChart"></canvas>
</div>

</div>

<script>
const labels = {{ labels | tojson }};
const values = {{ values | tojson }};

const ctx = document.getElementById("skillChart");

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: [
                '#36A2EB',
                '#FF6384',
                '#FFCE56',
                '#4CAF50',
                '#9C27B0'
            ]
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
