<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">


<style>
body { margin:0; font-family: Arial;
    background: url('https://mit.asia/wp-content/uploads/2025/07/Picture1.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
 }

/* Sidebar */
.navbar {
    margin-left: 230px;
}
.sidebar {
    width: 230px;
    height: 100vh;
    position: fixed;
    background: #1e293b;
    color: white;
    padding-top: 20px;
}

.sidebar h4 { text-align:center; margin-bottom:20px; }

.sidebar a {
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
}

.sidebar a:hover { background:#334155; }

/* Navbar */
.navbar {
    margin-left:230px;
    background:white;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* Content */
.content {
    margin-left:230px;
    padding:20px;
    animation: fadeIn 0.6s ease-in-out;
}

/* Cards */
.card {
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Animation */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}
</style>

</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    
    <div class="container-fluid">
    
    <a class="navbar-brand" href="#">🎓 Alumni_connect</a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
    
    <ul class="navbar-nav ms-auto">
    
    <li class="nav-item">
    <a class="nav-link" href="/dashboard">Home</a>
    </li>
    
    <li class="nav-item">
    <a class="nav-link" href="/contact">Contact</a>
    </li>
    
    <li class="nav-item">
    <a class="nav-link text-danger" href="/logout">Logout</a>
    </li>
    
    </ul>
    
    </div>
    
    </div>
    
    </nav>

<div class="sidebar">
    <h4>🎓 Alumni Panel</h4>

    <a href="/dashboard"><i class="bi bi-house"></i> Dashboard</a>
    
    
    <a href="/view_alumni"><i class="bi bi-people"></i> View Alumni</a>
    <a href="/analytics"><i class="bi bi-bar-chart"></i> Analytics</a>
    <a href="/skill_analysis"><i class="bi bi-pie-chart "></i> Skills</a>
    <a href="/add_event" class="bi bi-circle ">Add Event</a>
    <a href="/profile"><i class="bi bi-person-circle "></i> Profile</a>
    <a href="/messages"> <i class="bi bi-person-circle "></i>View Messages</a>
    <a href="/logout"><i class="bi bi-box-arrow-right "></i> Logout</a>
</div>

<div class="navbar d-flex justify-content-between">
    <h5>Dashboard</h5>
    <span>Welcome {{name}}</span>
</div>

<div class="content">

<h3>Overview</h3>

<div class="row mt-4">



<div class="col-md-4">
<div class="card p-3 text-center">
<i class="bi bi-people fs-1 text-success"></i>
<h5><a href="/view_alumni"> View Alumni</a></h5>
<p>Manage alumni records</p>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
<i class="bi bi-bar-chart fs-1 text-danger"></i>
<h5><a href="/analytics"> Analytics</a></h5>
<p>View insights</p>
</div>
</div>

</div>

</div>

</body>
</html>
