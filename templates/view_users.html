<!DOCTYPE html>
<html>
<head>
<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2>Registered Users</h2>

<table class="table table-bordered mt-4">

<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
</tr>

{% for u in users %}
<tr>
<td>{{u.name}}</td>
<td>{{u.email}}</td>
<td>{{u.role}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
